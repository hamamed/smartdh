# nginx site config — install to /etc/nginx/sites-available/smartdh.ma
# then: ln -s /etc/nginx/sites-available/smartdh.ma /etc/nginx/sites-enabled/
#
# NOTE: put this in place with only the :80 block first, run certbot, and it will
# add the SSL bits for you. The full file below is what you end up with.

server {
    listen 80;
    listen [::]:80;
    server_name smartdh.ma www.smartdh.ma;

    # certbot renewal probe
    location /.well-known/acme-challenge/ { root /var/www/html; }

    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name smartdh.ma www.smartdh.ma;

    ssl_certificate     /etc/letsencrypt/live/smartdh.ma/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/smartdh.ma/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # avatar uploads are capped at 3 MB in the app — leave headroom
    client_max_body_size 5M;

    # security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000" always;

    gzip on;
    gzip_types text/css application/javascript image/svg+xml application/json;
    gzip_min_length 512;

    # serve static files straight from disk (skips node entirely)
    location /css/     { alias /var/www/smartdh/public/css/;     expires 7d; access_log off; }
    location /js/      { alias /var/www/smartdh/public/js/;      expires 7d; access_log off; }
    location /icons/   { alias /var/www/smartdh/public/icons/;   expires 30d; access_log off; }
    location /uploads/ { alias /var/www/smartdh/public/uploads/; expires 30d; access_log off; }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        # REQUIRED: the app trusts this to know it's on https (secure cookies)
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}

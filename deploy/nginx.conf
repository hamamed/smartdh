# nginx site config for KanzUp  (kanzup.com + admin.kanzup.com)
#
# Install:  cp deploy/nginx.conf /etc/nginx/sites-available/kanzup.com
#           ln -sf /etc/nginx/sites-available/kanzup.com /etc/nginx/sites-enabled/
#           rm -f /etc/nginx/sites-enabled/default /etc/nginx/sites-enabled/smartdh.ma
#           nginx -t && systemctl reload nginx
#
# Then run certbot — it rewrites THIS file to add the TLS blocks and the
# http->https redirects for you (covers all three names):
#           certbot --nginx -d kanzup.com -d www.kanzup.com -d admin.kanzup.com --redirect
#
# (Port 80 only on purpose: referencing certificates before they exist makes
#  `nginx -t` fail. The app still lives at /var/www/smartdh on disk — only the
#  public domain changed.)

# ---- shared proxy + static settings via a map-free include is overkill, so we
#      just repeat the small blocks in each server. ----

# =========================  MAIN SITE  =========================
server {
    listen 80;
    listen [::]:80;
    server_name kanzup.com www.kanzup.com;

    client_max_body_size 5M;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    gzip on;
    gzip_types text/css application/javascript image/svg+xml application/json;
    gzip_min_length 512;

    location /css/     { alias /var/www/smartdh/public/css/;     expires 7d;  access_log off; }
    location /js/      { alias /var/www/smartdh/public/js/;      expires 7d;  access_log off; }
    location /icons/   { alias /var/www/smartdh/public/icons/;   expires 30d; access_log off; }
    location /uploads/ { alias /var/www/smartdh/public/uploads/; expires 30d; access_log off; }

    # Admin only lives on admin.kanzup.com — bounce it off the main domain.
    location /admin { return 301 https://admin.kanzup.com$request_uri; }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}

# =========================  ADMIN SUBDOMAIN  =========================
# Same app, but hitting the root of admin.kanzup.com sends you straight to the
# admin panel. You log in here and everything (login, /admin/*) stays on this host.
server {
    listen 80;
    listen [::]:80;
    server_name admin.kanzup.com;

    client_max_body_size 5M;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    gzip on;
    gzip_types text/css application/javascript image/svg+xml application/json;
    gzip_min_length 512;

    location /css/     { alias /var/www/smartdh/public/css/;     expires 7d;  access_log off; }
    location /js/      { alias /var/www/smartdh/public/js/;      expires 7d;  access_log off; }
    location /icons/   { alias /var/www/smartdh/public/icons/;   expires 30d; access_log off; }
    location /uploads/ { alias /var/www/smartdh/public/uploads/; expires 30d; access_log off; }

    # The app serves the admin hub at "/" on this host (clean URLs, no /admin),
    # so just proxy everything straight through.
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}

# After certbot succeeds you can optionally add HSTS to the generated 443 blocks:
#     add_header Strict-Transport-Security "max-age=31536000" always;

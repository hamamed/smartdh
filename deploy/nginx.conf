# nginx site config for smartdh.ma
#
# Install:  cp deploy/nginx.conf /etc/nginx/sites-available/smartdh.ma
#           ln -sf /etc/nginx/sites-available/smartdh.ma /etc/nginx/sites-enabled/
#           rm -f /etc/nginx/sites-enabled/default
#           nginx -t && systemctl reload nginx
#
# Then run certbot — it rewrites THIS file to add the TLS block and the
# http->https redirect for you:
#           certbot --nginx -d smartdh.ma -d www.smartdh.ma --redirect
#
# (This file is port 80 only on purpose: referencing certificates before they
#  exist makes `nginx -t` fail.)

server {
    listen 80;
    listen [::]:80;
    server_name smartdh.ma www.smartdh.ma;

    # avatar uploads are capped at 3 MB in the app — leave headroom
    client_max_body_size 5M;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    gzip on;
    gzip_types text/css application/javascript image/svg+xml application/json;
    gzip_min_length 512;

    # serve static files straight from disk (skips node entirely)
    location /css/     { alias /var/www/smartdh/public/css/;     expires 7d;  access_log off; }
    location /js/      { alias /var/www/smartdh/public/js/;      expires 7d;  access_log off; }
    location /icons/   { alias /var/www/smartdh/public/icons/;   expires 30d; access_log off; }
    location /uploads/ { alias /var/www/smartdh/public/uploads/; expires 30d; access_log off; }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        # REQUIRED: tells the app it's behind https so secure cookies work
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}

# After certbot succeeds you can optionally add HSTS to the generated 443 block:
#     add_header Strict-Transport-Security "max-age=31536000" always;
